name: Testes Cypress

on: [push, pull_request]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Rodar testes do Cypress
        uses: cypress-io/github-action@v7
        with:
          # Inicia, instala dependências e roda o cypress automaticamente
          install: true
      
      - name: Salvar Relatórios (HTML e JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-cypress
          path: mochawesome-report # Caminho padrão onde os relatórios do mochawesome costumam ser gerados
          retention-days: 1

      