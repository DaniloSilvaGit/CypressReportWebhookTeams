name: Pipeline de CI/CD

# Define quando o pipeline deve rodar
on:
  push:
    branches:
      - main

# Define os trabalhos (jobs) que serão executados
jobs:
  build:
   
    runs-on: ubuntu-latest

    steps:
      - task: NodeTool@0 
        imputs:
          VerionSpec: '18.x'
        displayName: 'Install Node.js'

      - script: |
          npm install
        displayName: 'npm install'

      - script: |
          npx cypress run
        displayName: 'run E2E tests'
        
        